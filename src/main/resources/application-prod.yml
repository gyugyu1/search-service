server:
  address: 0.0.0.0
  port: 8081

elasticsearch:
  host: ${ELASTICSEARCH_HOST:https://localhost:9200}
  username: ${ELASTICSEARCH_USERNAME:}
  password: ${ELASTICSEARCH_PASSWORD:}
  ssl:
    # false 시 truststore-path 로 ES 인증서 검증 (운영 self-signed CA)
    insecure: ${ELASTICSEARCH_SSL_INSECURE:false}
    truststore-path: ${ELASTICSEARCH_SSL_TRUSTSTORE_PATH:}
    truststore-password: ${ELASTICSEARCH_SSL_TRUSTSTORE_PASSWORD:changeit}

kakao:
  api:
    key: ${KAKAO_API_KEY:}
