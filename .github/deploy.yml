name: Build and Deploy (search-service)
on:
  push:
    branches: [main]
  workflow_dispatch:
env:
  DOCKER_IMAGE_SEARCH: search-service
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_SEARCH }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_SEARCH }}:${{ github.sha }}
  deploy:
    runs-on: [self-hosted, prod]
    needs: build-and-push
    steps:
      - name: Deploy via existing compose on server
        run: |
          COMPOSE_DIR=/opt/geonpil
          cd "$COMPOSE_DIR"
          sudo docker compose --project-directory "$COMPOSE_DIR" --env-file "$COMPOSE_DIR/.env" -f "$COMPOSE_DIR/docker-compose.prod.yml" pull search-service
          sudo docker compose --project-directory "$COMPOSE_DIR" --env-file "$COMPOSE_DIR/.env" -f "$COMPOSE_DIR/docker-compose.prod.yml" up -d
          sudo docker compose --project-directory "$COMPOSE_DIR" -f "$COMPOSE_DIR/docker-compose.prod.yml" ps