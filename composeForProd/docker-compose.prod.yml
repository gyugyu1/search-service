# search-serviceл§Ң мӢӨн–ү, geonpil-networkмқҳ Elasticsearchм—җ м—°кІ°
# м „м ң: geonpil мӘҪм—җм„ң docker network create geonpil-network нӣ„ Elasticsearch л“ұ кё°лҸҷ
# мӢӨн–ү: docker-compose up -d
# л№Ңл“ң: docker-compose up -d --build
services:
  search-service:
    build: .
    image: search-service:latest
    container_name: search-service
    env_file: .env
    ports:
      - "18082:8081"
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-https://elasticsearch:9200}
      - ELASTICSEARCH_SSL_INSECURE=${ELASTICSEARCH_SSL_INSECURE:-false}
      - ELASTICSEARCH_SSL_TRUSTSTORE_PATH=/certs/truststore.jks
      - ELASTICSEARCH_SSL_TRUSTSTORE_PASSWORD=${ELASTICSEARCH_TRUSTSTORE_PASSWORD:-changeit}
      - KAKAO_API_KEY=${KAKAO_API_KEY:-}
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - geonpil-net
    volumes:
      - ./certs:/certs:ro

networks:
  geonpil-net:
    external: true
