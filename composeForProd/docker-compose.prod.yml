# search-serviceл§Ң мӢӨн–ү, geonpil-networkмқҳ Elasticsearchм—җ м—°кІ°
# м „м ң: geonpil мӘҪм—җм„ң docker network create geonpil-network нӣ„ Elasticsearch л“ұ кё°лҸҷ
# мӢӨн–ү: docker-compose up -d
# л№Ңл“ң: docker-compose up -d --build
services:
  search-service:
    build: .
    image: search-service:latest
    container_name: search-service
    env_file: .env
    ports:
      - "18082:8081"
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-https://elasticsearch:9200}
      - ELASTICSEARCH_SSL_INSECURE=${ELASTICSEARCH_SSL_INSECURE:-true}
      - KAKAO_API_KEY=043ce262cb71f664e9ac1e46f4fb94a6
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - geonpil-net

networks:
  geonpil-net:
    external: true
